# iOS未签名IPA云端构建(2026-07-17 用户"iOS包用线连手机·你开始吧")
# 路线: macOS runner → Godot headless导出Xcode工程(export_project_only) → xcodebuild免签编译 → 打包unsigned IPA artifact
# 用户侧: Actions页下载 turtle-ios-unsigned → Windows装Sideloadly → iPhone USB连电脑 → 拖入IPA用AppleID签名安装
#         → 手机 设置→通用→VPN与设备管理→信任自己的AppleID证书。免费证书7天过期, 重签即可(存档不丢)。
# 构建=debug模板: OS.is_debug_build()=true → 调试场按钮出现; REVIEW_DEMO_DEFAULT=false → 正常匹配不被劫持。
name: iOS unsigned IPA

on:
  # ★只手动触发(用户2026-07-24): 原来每次 push main 都跑, 而这个构建当前会失败
  #   (Godot 4.6 iOS 模板用 Swift 6 工具链编, runner 的 Xcode 链 libgodot.a 缺 swift_Builtin_float 符号)
  #   → 每次推送都发一封 GitHub "run failed" 邮件。改成只在要出包时手动跑(Actions 页 → Run workflow)。
  #   tests.yml 仍在 push 上跑(那是提交门禁, 要它挡回归)。
  workflow_dispatch:

permissions:
  contents: write   # 失败时把构建日志推到ci-logs分支(本地无token读不了Actions日志API·git拉分支即可看)

jobs:
  build-ios:
    runs-on: macos-latest   # Xcode 15.4链接libgodot.a报swift_Builtin_float缺失(Godot 4.6模板=Swift 6工具链编的)→要新Xcode
    timeout-minutes: 40
    env:
      GODOT_VERSION: "4.6.3-stable"
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode on image
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Download Godot (macOS)
        run: |
          curl -fL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot.zip
          echo "GODOT=$PWD/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_ENV"

      - name: Install export templates
        run: |
          curl -fL -o templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          TPL_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION/-stable/.stable}"
          mkdir -p "$TPL_DIR"
          unzip -q templates.tpz -d /tmp/tpl
          cp -R /tmp/tpl/templates/. "$TPL_DIR/"
          ls "$TPL_DIR" | head

      - name: Import project resources
        run: |
          "$GODOT" --headless --import --path . || true

      - name: Export iOS Xcode project (debug, project only)
        run: |
          mkdir -p build/ios
          "$GODOT" --headless --export-debug "iOS" "$PWD/build/ios/turtle.ipa" --path .
          echo "--- exported files ---"
          find build/ios -maxdepth 2 | head -40

      - name: Build .app without codesign
        run: |
          set -o pipefail
          cd build/ios
          PROJ=$(ls -d *.xcodeproj | head -1)
          echo "project=$PROJ" | tee diag.log
          xcodebuild -list -project "$PROJ" 2>&1 | tee -a diag.log || true
          xcodebuild -project "$PROJ" -alltargets -configuration Debug -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            CONFIGURATION_BUILD_DIR="$PWD/out" build 2>&1 | tee xcodebuild.log
          echo "--- built ---"
          ls out

      - name: Push logs to ci-logs branch on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf /tmp/logrepo && mkdir /tmp/logrepo && cd /tmp/logrepo
          git init -q -b ci-logs
          cp "$GITHUB_WORKSPACE"/build/ios/*.log . 2>/dev/null || echo "no logs captured" > note.txt
          tail -c 200000 xcodebuild.log > xcodebuild.tail.log 2>/dev/null || true
          git add -A
          git -c user.name=ci -c user.email=ci@ci commit -qm "ci logs run#${GITHUB_RUN_NUMBER}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ci-logs

      - name: Pack unsigned IPA
        run: |
          cd build/ios
          APP=$(ls -d out/*.app | head -1)
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry turtle-ios-unsigned.ipa Payload
          ls -la turtle-ios-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: turtle-ios-unsigned
          path: build/ios/turtle-ios-unsigned.ipa
          retention-days: 14
