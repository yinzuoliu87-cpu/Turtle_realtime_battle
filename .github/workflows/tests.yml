# 提交门禁 CI (2026-07-21)
#
# 【为什么单开一个 workflow 而不塞进 ios-build.yml】
#   出包与门禁职责不同: 门禁红了不该拦住出包(你可能就是要装个包去现场看 bug),
#   出包挂了(苹果工具链抽风)也不该让人以为代码坏了。分开跑, 各自结论清晰。
#
# 【为什么必须有】此前 CI 只出 iOS 包、【零处跑测试】, 于是:
#   · run-tests.sh 从 2026-07-16 起一直是红的, 4 天没人发现
#   · 36 个测试里 8 个从没被执行过(runner 是硬编码名单, 已改自动发现)
#   本地门禁靠人记得跑; CI 门禁是【每次 push 都强制跑】, 这才是真兜底。
#
# 用 ubuntu(比 macOS runner 便宜且快); Godot headless 跑测试不需要图形。
name: 提交门禁(测试+审计)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GODOT_VERSION: "4.6.3-stable"
    steps:
      - uses: actions/checkout@v4

      - name: 装 Godot (linux headless)
        run: |
          curl -fL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          BIN="$(ls Godot_v*_linux.x86_64 | head -1)"
          chmod +x "$BIN"
          echo "GODOT=$PWD/$BIN" >> "$GITHUB_ENV"
          "$PWD/$BIN" --version || true

      - name: 导入资源 (注册 class_name / 生成 .godot)
        run: |
          "$GODOT" --headless --import --path . || true

      - name: 只读数据审计 (不需要 Godot, 先跑=快速失败)
        run: |
          python3 tools/data_integrity.py
          python3 tools/tooltip_number_audit.py
          TRI_OUT="$PWD/tri_audit_report.txt" python3 tools/tri_audit.py

      - name: 自证测试 + 冒烟 + 三方对账
        run: |
          set -o pipefail
          # ★必须把输出落盘 —— 否则失败时那步只推了个时间戳, 等于什么都没留下
          bash run-tests.sh 2>&1 | tee /tmp/gate.log

      # ★把失败原因做成 check-run 注解 —— 这是【唯一不需要 token 就能远程读到】的通道:
      #   · Actions 日志 API 要 admin 权限(403)
      #   · artifact 下载要认证(401), 公开仓库也一样
      #   · 推 ci-logs 分支要 contents:write, 而仓库的 Actions 默认权限是只读 → 403
      #   2026-07-22 实测三条全堵死, 我完全读不到门禁为什么红。注解 API 是公开可读的。
      - name: 把失败行做成注解(无 token 也能远程读)
        if: failure()
        run: |
          # ★这一段 2026-07-23 修过一次: 原来有一行 `tr '\n' ' | '`, 里面的换行是【真换行】,
          #   续行顶到第 0 列 —— 缩进比块标量小就会终止块, GitHub 于是拿后半行当 YAML 解析
          #   → 整个工作流解析失败 → name 读不到(页面显示成文件路径)、【一个 job 都不跑】。
          #   表现是 conclusion=failure 但 jobs 为空, 极易误判成"测试挂了"。
          #   教训: 工作流里【不要写含转义换行的单行命令】, 用多行、每行都保持缩进。
          if [ ! -f /tmp/gate.log ]; then
            echo "::error title=gate::没抓到 /tmp/gate.log"
            exit 0
          fi
          grep -nE "\[FAIL\]|^FAIL|FAILED|SCRIPT ERROR|Parse Error|Max recursion|NEEDS" /tmp/gate.log > /tmp/gate.hits || true
          head -40 /tmp/gate.hits | while IFS= read -r line; do
            echo "::error title=gate::${line}"
          done
          tail -n 25 /tmp/gate.log > /tmp/gate.tail
          while IFS= read -r line; do
            echo "::error title=gate-tail::${line}"
          done < /tmp/gate.tail

      - name: 失败时把日志推到 ci-logs 分支
        if: failure()
        continue-on-error: true   # 仓库 Actions 权限若是只读, 这一步必然 403; 别让它盖过真正的失败原因
        run: |
          # 本地读不了 Actions 日志 API(无 token), 推到分支后 git fetch origin ci-logs 就能看
          mkdir -p /tmp/cilog
          cp -f /tmp/gate.log /tmp/cilog/gate.log 2>/dev/null || echo "(没抓到 gate.log)" > /tmp/cilog/gate.log
          tail -n 120 /tmp/gate.log > /tmp/cilog/gate.tail.log 2>/dev/null || true
          grep -nE "FAIL|错误|Error|ERROR|Parse|Max recursion" /tmp/gate.log | head -80 > /tmp/cilog/gate.errors.log 2>/dev/null || true
          cp -f tri_audit_report.txt /tmp/cilog/ 2>/dev/null || true
          git config user.name "ci"; git config user.email "ci@local"
          git checkout --orphan ci-logs-tmp
          git rm -rf --cached . >/dev/null 2>&1 || true
          rm -rf $(ls -A | grep -v '^\.git$') 2>/dev/null || true
          cp -f /tmp/cilog/* . 2>/dev/null || true
          date > gate-failed-at.txt
          git add -A && git commit -m "gate failed $(date -u +%FT%TZ)" || true
          # ★不再 `|| true` 静默吞掉: 这条逃生口此前【从没真正工作过】——
          #   tests.yml 没有 permissions 块(默认只读) → push 必然 403, 而 || true 把它咽了,
          #   于是这一步永远显示 success, ci-logs 却停在 2026-07-17。
          #   2026-07-22: 0.10.2 那次门禁红了, 我因此完全读不到原因。
          if git push -f origin HEAD:ci-logs; then
            echo "::notice::失败日志已推到 ci-logs 分支; 本地看: git fetch -f origin +refs/heads/ci-logs:refs/remotes/origin/ci-logs && git show origin/ci-logs:gate.errors.log"
          else
            echo "::error::推 ci-logs 失败 —— 检查 workflow 的 permissions: contents: write"
            exit 1
          fi
